<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💰 Budget Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #1f2937; font-size: 14px; }
input, select, button, textarea { font-family: inherit; font-size: 14px; }
input[type=number]::-webkit-inner-spin-button { opacity: 1; }
button { cursor: pointer; }

/* Layout */
.page { min-height: 100vh; padding-bottom: 48px; }
.header { background: white; border-bottom: 1px solid #e5e7eb; padding: 14px 16px; position: sticky; top: 0; z-index: 10; }
.header-inner { max-width: 640px; margin: 0 auto; }
.content { max-width: 640px; margin: 0 auto; padding: 20px 16px 0; }

/* Month nav */
.month-nav { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
.nav-btn { width: 32px; height: 32px; border-radius: 50%; background: #f3f4f6; border: none; font-size: 20px; line-height: 1; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover { background: #e5e7eb; }
.month-label { font-weight: 600; width: 120px; text-align: center; }

/* Tabs */
.tabs { display: flex; gap: 8px; }
.tab-btn { padding: 6px 16px; border-radius: 999px; border: none; font-weight: 600; font-size: 13px; background: #f3f4f6; color: #4b5563; }
.tab-btn:hover { background: #e5e7eb; }
.tab-btn.active { background: #4f46e5; color: white; }

/* Summary grid */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.card { background: white; border-radius: 12px; padding: 12px; border: 1px solid #f3f4f6; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.card-label { font-size: 11px; color: #9ca3af; margin-bottom: 3px; }
.card-val { font-weight: 700; font-size: 15px; }
.card-sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.card-delta { font-size: 11px; font-weight: 600; margin-top: 2px; }

/* Sections */
.section { background: white; border-radius: 12px; border: 1px solid #f3f4f6; box-shadow: 0 1px 2px rgba(0,0,0,0.04); overflow: hidden; margin-bottom: 14px; }
.section-head { padding: 8px 16px; font-size: 13px; font-weight: 700; }
.section-head.blue  { background: #eef2ff; color: #4338ca; }
.section-head.red   { background: #fff1f2; color: #be123c; }
.section-head.green { background: #ecfdf5; color: #065f46; }

/* Category rows */
.cat-row { padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f9fafb; user-select: none; }
.cat-row:hover { background: #fafafa; }
.arrow { font-size: 9px; color: #9ca3af; display: inline-block; transition: transform 0.15s; width: 10px; }
.arrow.open { transform: rotate(90deg); }
.cat-name { flex: 1; }
.badge { font-size: 11px; background: #fffbeb; color: #d97706; border: 1px solid #fde68a; border-radius: 999px; padding: 1px 7px; font-weight: 600; }
.cat-avg { font-size: 11px; color: #9ca3af; width: 68px; text-align: right; }
.cat-total { width: 100px; text-align: right; font-weight: 700; }
.cat-total.empty { color: #d1d5db; font-weight: 400; }
.remove-btn { background: none; border: none; color: #d1d5db; font-size: 13px; padding: 0 2px; }
.remove-btn:hover { color: #ef4444; }
.section-footer { padding: 10px 16px; background: #f9fafb; display: flex; align-items: center; border-top: 1px solid #f3f4f6; font-weight: 700; }

/* Expanded area */
.expand-area { background: #f9fafb; border-top: 1px solid #f3f4f6; padding: 12px 16px; }
.item-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.recur-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #e5e7eb; background: white; font-size: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.recur-btn.on { background: #fef3c7; border-color: #fcd34d; }
.item-label { flex: 1; border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px 10px; outline: none; background: white; }
.item-label:focus { border-color: #6366f1; }
.eur { color: #9ca3af; }
.item-amount { width: 90px; text-align: right; border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px 8px; outline: none; background: white; }
.item-amount:focus { border-color: #6366f1; }
.add-item-btn { background: none; border: none; color: #6366f1; font-size: 12px; font-weight: 600; margin-top: 2px; }
.add-item-btn:hover { color: #4338ca; }
.expand-total { text-align: right; border-top: 1px solid #e5e7eb; margin-top: 8px; padding-top: 6px; font-size: 12px; color: #6b7280; font-weight: 600; }
.recur-note { font-size: 11px; color: #d97706; margin-top: 6px; }

/* Add category row */
.add-row { display: flex; gap: 8px; margin-bottom: 14px; }
.add-input { flex: 1; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 12px; outline: none; }
.add-input:focus { border-color: #6366f1; }
.add-btn { background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; }
.add-btn:hover { background: #4338ca; }

/* Setup screen */
.setup-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; background: #f9fafb; }
.setup-box { background: white; border-radius: 16px; padding: 32px; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.setup-box h1 { font-size: 20px; margin-bottom: 6px; }
.setup-box p { font-size: 13px; color: #6b7280; margin-bottom: 20px; }
.setup-box ol { font-size: 13px; color: #374151; line-height: 2; margin-bottom: 20px; padding-left: 20px; }
.setup-box a { color: #4f46e5; }
.url-input { width: 100%; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: 13px; outline: none; margin-bottom: 10px; }
.url-input:focus { border-color: #6366f1; }
.connect-btn { width: 100%; background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 600; }
.connect-btn:hover { background: #4338ca; }
.error-msg { color: #ef4444; font-size: 12px; margin-bottom: 8px; }
.change-url-btn { background: none; border: none; color: #9ca3af; font-size: 12px; display: block; margin: 0 auto 8px; }
.change-url-btn:hover { color: #ef4444; }

/* Chart bars */
.chart-wrap { background: white; border-radius: 12px; border: 1px solid #f3f4f6; padding: 16px; margin-bottom: 14px; }
.chart-title { font-weight: 700; margin-bottom: 4px; }
.chart-sub { font-size: 11px; color: #9ca3af; margin-bottom: 14px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
.bar-label { width: 90px; color: #374151; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
.bar-track { flex: 1; height: 18px; background: #f3f4f6; border-radius: 4px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 4px; position: absolute; top: 0; left: 0; transition: width 0.3s; }
.bar-val { width: 70px; text-align: right; color: #6b7280; font-size: 11px; }
.legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }

/* Trend line chart */
.trend-line-wrap { position: relative; height: 160px; margin-top: 8px; }
canvas.trend-canvas { width: 100%; height: 100%; }

/* Sync status */
.sync-status { font-size: 12px; }
.sync-ok { color: #34d399; }
.sync-saving { color: #fbbf24; }
.sync-error { color: #f87171; }

/* Colors */
.green { color: #16a34a; }
.red { color: #ef4444; }
.muted { color: #9ca3af; }

@media (max-width: 500px) {
  .summary-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="page">
  <div id="app"></div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const DEFAULT_CATS = ["Housing","Groceries","Dining","Transport","Health","Leisure","Subscriptions","Travel","Other"];
const INVEST_CAT = "Investing";
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let _uid = 0;
const uid  = () => "i" + (++_uid);
const ni   = () => ({ id: uid(), label: "", amount: "", recurring: false });
const mk   = (y, m) => `${y}-${String(m).padStart(2,"0")}`;
const pmk  = (y, m) => m === 0 ? mk(y-1, 11) : mk(y, m-1);
const fmt  = n => n == null ? "—" : "€" + Number(n).toLocaleString("en-BE", {minimumFractionDigits:0, maximumFractionDigits:0});
const pct  = (a, b) => (b == null || b === 0) ? null : ((a - b) / b * 100).toFixed(1);

function ensureIds(arr) {
  if (!Array.isArray(arr)) return [ni()];
  return arr.map(it => it.id ? it : { ...it, id: uid() });
}

function listTotal(items) {
  if (!items) return 0;
  if (Array.isArray(items)) return items.reduce((s, x) => s + (Number(x.amount) || 0), 0);
  return Number(items) || 0;
}

function entryIncome(entry) {
  if (!entry) return 0;
  if (entry.incomeItems && Array.isArray(entry.incomeItems))
    return entry.incomeItems.reduce((s, x) => s + (Number(x.amount) || 0), 0);
  return Number(entry.income) || 0;
}

function trail12(data, y, m, cat) {
  const vals = [];
  for (let i = 1; i <= 12; i++) {
    let pm = m - i, py = y;
    if (pm < 0) { pm += 12; py--; }
    const e = data[mk(py, pm)];
    if (!e) continue;
    const src = cat === INVEST_CAT ? e.investing : (e.expenses && e.expenses[cat]);
    if (src !== undefined) vals.push(listTotal(src));
  }
  return vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : null;
}

function trail12Inc(data, y, m) {
  const vals = [];
  for (let i = 1; i <= 12; i++) {
    let pm = m - i, py = y;
    if (pm < 0) { pm += 12; py--; }
    const e = data[mk(py, pm)];
    if (e) vals.push(entryIncome(e));
  }
  return vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : null;
}

function seedMonth(data, y, m, cats) {
  const prev = data[pmk(y, m)];
  if (!prev) return { expenses: {}, investing: [] };
  const expenses = {};
  for (const cat in (prev.expenses || {})) {
    if (!cats.includes(cat)) continue;
    const r = (prev.expenses[cat] || []).filter(i => i.recurring);
    if (r.length) expenses[cat] = r.map(i => ({ ...i, id: uid() }));
  }
  const investing = (Array.isArray(prev.investing) ? prev.investing : [])
    .filter(i => i.recurring).map(i => ({ ...i, id: uid() }));
  return { expenses, investing };
}

function seedIncome(data, y, m) {
  const prev = data[pmk(y, m)];
  if (!prev || !prev.incomeItems) return null;
  const r = prev.incomeItems.filter(i => i.recurring);
  return r.length ? r.map(i => ({ ...i, id: uid() })) : null;
}

// ── Google Sheets storage ─────────────────────────────────────────────────────
function makeStorage(url) {
  function get(key) {
    return fetch(url + "?action=get&key=" + encodeURIComponent(key))
      .then(r => r.json()).then(j => j.ok ? j.value : null);
  }
  function set(key, value) {
    // Use GET-only to avoid CORS preflight issues with Apps Script
    return fetch(url + "?action=set&key=" + encodeURIComponent(key) + "&value=" + encodeURIComponent(value))
      .then(r => r.json());
  }
  return { get, set };
}

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  scriptUrl: localStorage.getItem("budget-url") || "",
  urlInput: "",
  syncStatus: "idle", // idle | saving | ok | error
  syncError: "",
  data: {},
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  cats: [...DEFAULT_CATS],
  tab: "entry",
  newCat: "",
  trendCat: "Groceries",
  expanded: {},
  incomeOpen: false,
  investOpen: false,
  loaded: false,
  storage: null,
};

function render() {
  document.getElementById("app").innerHTML = "";
  document.getElementById("app").appendChild(
    state.scriptUrl === "" ? renderSetup() :
    !state.loaded         ? renderLoading() :
                             renderApp()
  );
}

// ── Setup screen ──────────────────────────────────────────────────────────────
function renderSetup() {
  const wrap = el("div", { className: "setup-wrap" });
  const box  = el("div", { className: "setup-box" });

  box.appendChild(el("h1", {}, "💰 Budget Tracker"));
  box.appendChild(el("p", {}, "Connect to Google Sheets to sync data across all devices."));

  const ol = el("ol");
  [
    ["Open ", a("https://sheets.google.com", "Google Sheets"), " and create a new spreadsheet."],
    ["Click ", b("Extensions → Apps Script"), "."],
    ["Paste in the Apps Script code, save (💾)."],
    ["Click ", b("Deploy → New deployment"), ". Type: ", b("Web app"), ". Access: ", b("Anyone"), ". Deploy."],
    ["Copy the Web app URL and paste it below."],
  ].forEach(parts => {
    const li = el("li");
    parts.forEach(p => typeof p === "string" ? li.appendChild(document.createTextNode(p)) : li.appendChild(p));
    ol.appendChild(li);
  });
  box.appendChild(ol);

  if (state.syncError) {
    const err = el("p", { className: "error-msg" }, "Error: " + state.syncError);
    box.appendChild(err);
  }

  const inp = el("input", { className: "url-input", type: "text", placeholder: "https://script.google.com/macros/s/...", value: state.urlInput });
  inp.addEventListener("input", e => { state.urlInput = e.target.value; });
  inp.addEventListener("keydown", e => { if (e.key === "Enter") connect(); });
  box.appendChild(inp);

  const btn = el("button", { className: "connect-btn" }, "Connect");
  btn.addEventListener("click", connect);
  box.appendChild(btn);

  wrap.appendChild(box);
  return wrap;
}

function connect() {
  const url = state.urlInput.trim();
  if (!url) return;
  localStorage.setItem("budget-url", url);
  state.scriptUrl = url;
  loadData();
}

function renderLoading() {
  return el("div", { style: "display:flex;align-items:center;justify-content:center;height:100vh;color:#9ca3af;" }, "Loading from Google Sheets…");
}

// ── Load / Persist ────────────────────────────────────────────────────────────
function loadData() {
  state.loaded = false;
  state.syncStatus = "saving";
  render();
  const s = makeStorage(state.scriptUrl);
  Promise.all([s.get("budget-data"), s.get("budget-cats")])
    .then(([d, c]) => {
      const parsed = d ? JSON.parse(d) : {};
      for (const k in parsed) {
        const e = parsed[k];
        if (e.incomeItems) e.incomeItems = ensureIds(e.incomeItems);
        if (e.investing)   e.investing   = ensureIds(e.investing);
        if (e.expenses) for (const cat in e.expenses) e.expenses[cat] = ensureIds(e.expenses[cat]);
      }
      state.data = parsed;
      state.cats = c ? JSON.parse(c) : [...DEFAULT_CATS];
      state.storage = s;
      state.syncStatus = "ok";
      state.syncError = "";
      state.loaded = true;
      render();
    })
    .catch(err => {
      state.syncError = err.message || "Connection failed. Check your URL.";
      state.syncStatus = "error";
      state.scriptUrl = "";
      state.loaded = false;
      render();
    });
}

function persist() {
  if (!state.storage) return;
  state.syncStatus = "saving";
  updateSyncBadge();
  Promise.all([
    state.storage.set("budget-data", JSON.stringify(state.data)),
    state.storage.set("budget-cats", JSON.stringify(state.cats))
  ]).then(() => { state.syncStatus = "ok"; updateSyncBadge(); })
    .catch(() => { state.syncStatus = "error"; updateSyncBadge(); });
}

function updateSyncBadge() {
  const el = document.getElementById("sync-badge");
  if (!el) return;
  const map = { saving: ["☁️ Saving…","sync-saving"], ok: ["☁️ Synced","sync-ok"], error: ["⚠️ Error","sync-error"], idle: ["",""] };
  const [txt, cls] = map[state.syncStatus] || ["",""];
  el.textContent = txt;
  el.className = "sync-status " + cls;
}

// ── Entry helpers ─────────────────────────────────────────────────────────────
function getEntry() {
  const key = mk(state.year, state.month);
  if (state.data[key]) return state.data[key];
  const { expenses, investing } = seedMonth(state.data, state.year, state.month, state.cats);
  const inc = seedIncome(state.data, state.year, state.month);
  const base = { income: "", expenses, investing };
  if (inc) base.incomeItems = inc;
  return base;
}

function saveEntry(entry) {
  const key = mk(state.year, state.month);
  state.data = { ...state.data, [key]: entry };
  persist();
}

function getIncItems(entry) { return entry.incomeItems && entry.incomeItems.length ? entry.incomeItems : [ni()]; }
function getInvItems(entry) { return Array.isArray(entry.investing) && entry.investing.length ? entry.investing : [ni()]; }
function getCatItems(entry, cat) {
  const v = entry.expenses && entry.expenses[cat];
  if (!v) return [ni()];
  if (Array.isArray(v)) return v.length ? v : [ni()];
  return [{ ...ni(), amount: v }];
}

function updateListItem(list, id, field, val) {
  return list.map(it => it.id === id ? { ...it, [field]: val } : it);
}
function toggleListItem(list, id) {
  return list.map(it => it.id === id ? { ...it, recurring: !it.recurring } : it);
}
function removeListItem(list, id) {
  const r = list.filter(it => it.id !== id);
  return r.length ? r : [ni()];
}

// ── Main app render ───────────────────────────────────────────────────────────
function renderApp() {
  const root = el("div");

  // Header
  const hdr = el("div", { className: "header" });
  const hdrInner = el("div", { className: "header-inner" });

  const titleRow = el("div", { style: "display:flex;justify-content:space-between;align-items:center;" });
  titleRow.appendChild(el("span", { style: "font-size:18px;font-weight:700;" }, "💰 Budget Tracker"));
  const badge = el("span", { id: "sync-badge", className: "sync-status sync-ok" }, "☁️ Synced");
  titleRow.appendChild(badge);
  hdrInner.appendChild(titleRow);

  // Month nav
  const nav = el("div", { className: "month-nav" });
  const prevBtn = el("button", { className: "nav-btn" }, "‹");
  prevBtn.addEventListener("click", () => { if (state.month === 0) { state.month = 11; state.year--; } else state.month--; render(); });
  nav.appendChild(prevBtn);
  nav.appendChild(el("span", { className: "month-label" }, MONTHS[state.month] + " " + state.year));
  const nextBtn = el("button", { className: "nav-btn" }, "›");
  nextBtn.addEventListener("click", () => { if (state.month === 11) { state.month = 0; state.year++; } else state.month++; render(); });
  nav.appendChild(nextBtn);
  hdrInner.appendChild(nav);

  // Tabs
  const tabs = el("div", { className: "tabs" });
  ["entry","chart","trends"].forEach(t => {
    const btn = el("button", { className: "tab-btn" + (state.tab === t ? " active" : "") }, t === "entry" ? "Entry" : t === "chart" ? "vs. Average" : "Trends");
    btn.addEventListener("click", () => { state.tab = t; render(); });
    tabs.appendChild(btn);
  });
  hdrInner.appendChild(tabs);
  hdr.appendChild(hdrInner);
  root.appendChild(hdr);

  // Content
  const content = el("div", { className: "content" });

  // Summary
  const entry = getEntry();
  const totalInc = entryIncome(entry);
  const totalExp = state.cats.reduce((s, c) => s + listTotal(entry.expenses && entry.expenses[c]), 0);
  const totalInv = listTotal(entry.investing);
  const netCash  = totalInc - totalExp - totalInv;
  const savRate  = totalInc > 0 ? (netCash / totalInc * 100).toFixed(1) : null;
  const t12Inc   = trail12Inc(state.data, state.year, state.month);
  const t12Inv   = trail12(state.data, state.year, state.month, INVEST_CAT);
  const t12Sav   = (() => {
    const vals = [];
    for (let i = 1; i <= 12; i++) {
      let pm = state.month - i, py = state.year;
      if (pm < 0) { pm += 12; py--; }
      const e = state.data[mk(py, pm)];
      if (!e) continue;
      vals.push(entryIncome(e) - state.cats.reduce((s,c) => s + listTotal(e.expenses && e.expenses[c]), 0) - listTotal(e.investing));
    }
    return vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : null;
  })();
  const invDelta = t12Inv != null && totalInv > 0 ? pct(totalInv, t12Inv) : null;

  const sumGrid = el("div", { className: "summary-grid" });
  [
    { label: "Income",    val: fmt(totalInc || null), sub: t12Inc ? "avg " + fmt(t12Inc) : "no history", delta: t12Inc ? pct(totalInc, t12Inc) : null, inv: false, exp: false },
    { label: "Expenses",  val: fmt(totalExp || null), sub: null, delta: null, inv: false, exp: true },
    { label: "Investing", val: fmt(totalInv || null), sub: t12Inv ? "avg " + fmt(t12Inv) : null, delta: invDelta, inv: true, exp: false },
    { label: "Net Cash",  val: fmt(netCash  || null), sub: savRate ? savRate + "% rate" : null, delta: t12Sav != null ? pct(netCash, t12Sav) : null, inv: false, exp: false },
  ].forEach(({ label, val, sub, delta, inv, exp }) => {
    const card = el("div", { className: "card" });
    card.appendChild(el("div", { className: "card-label" }, label));
    card.appendChild(el("div", { className: "card-val" }, val));
    if (sub) card.appendChild(el("div", { className: "card-sub" }, sub));
    if (delta != null) {
      const up = Number(delta) > 0;
      const color = inv ? (up ? "green" : "red") : exp ? (up ? "red" : "green") : (up ? "green" : "red");
      card.appendChild(el("div", { className: "card-delta " + color }, (up ? "+" : "") + delta + "% vs avg"));
    }
    sumGrid.appendChild(card);
  });
  content.appendChild(sumGrid);

  if (state.tab === "entry")  content.appendChild(renderEntry(entry, totalExp));
  if (state.tab === "chart")  content.appendChild(renderChart(entry));
  if (state.tab === "trends") content.appendChild(renderTrends());

  root.appendChild(content);
  return root;
}

// ── Entry tab ─────────────────────────────────────────────────────────────────
function renderEntry(entry, totalExp) {
  const wrap = el("div");

  // Income section
  const incItems = getIncItems(entry);
  const incRC = incItems.filter(i => i.recurring).length;
  const totalInc = entryIncome(entry);
  const t12Inc = trail12Inc(state.data, state.year, state.month);
  wrap.appendChild(renderSection("Income", "blue",
    renderCatRow("__income__", "Total income", totalInc, t12Inc, incRC, state.incomeOpen, false,
      () => { state.incomeOpen = !state.incomeOpen; render(); }, null),
    state.incomeOpen ? renderExpand(incItems,
      (id, v) => { const e = getEntry(); saveEntry({ ...e, incomeItems: updateListItem(getIncItems(e), id, "label", v) }); rerenderExpand(); },
      (id, v) => { const e = getEntry(); saveEntry({ ...e, incomeItems: updateListItem(getIncItems(e), id, "amount", v) }); rerenderExpand(); },
      (id)    => { const e = getEntry(); saveEntry({ ...e, incomeItems: toggleListItem(getIncItems(e), id) }); render(); },
      (id)    => { const e = getEntry(); saveEntry({ ...e, incomeItems: removeListItem(getIncItems(e), id) }); render(); },
      ()      => { const e = getEntry(); saveEntry({ ...e, incomeItems: getIncItems(e).concat([ni()]) }); render(); },
      "Add income source", incRC
    ) : null
  ));

  // Expenses section
  const expSection = el("div", { className: "section" });
  expSection.appendChild(el("div", { className: "section-head red" }, "Expenses"));
  state.cats.forEach(cat => {
    const items = getCatItems(entry, cat);
    const total = listTotal(entry.expenses && entry.expenses[cat]);
    const avg   = trail12(state.data, state.year, state.month, cat);
    const d     = avg != null && total > 0 ? pct(total, avg) : null;
    const rc    = items.filter(i => i.recurring).length;
    const isOpen = state.expanded[cat];

    expSection.appendChild(renderCatRow(cat, cat, total, avg, rc, isOpen, true,
      () => { state.expanded = { ...state.expanded, [cat]: !isOpen }; render(); },
      () => { state.cats = state.cats.filter(x => x !== cat); persist(); render(); },
      d
    ));
    if (isOpen) {
      expSection.appendChild(renderExpand(items,
        (id, v) => { const e = getEntry(); const its = updateListItem(getCatItems(e,cat), id, "label", v); saveEntry({ ...e, expenses: { ...e.expenses, [cat]: its } }); rerenderExpand(); },
        (id, v) => { const e = getEntry(); const its = updateListItem(getCatItems(e,cat), id, "amount", v); saveEntry({ ...e, expenses: { ...e.expenses, [cat]: its } }); rerenderExpand(); },
        (id)    => { const e = getEntry(); const its = toggleListItem(getCatItems(e,cat), id); saveEntry({ ...e, expenses: { ...e.expenses, [cat]: its } }); render(); },
        (id)    => { const e = getEntry(); const its = removeListItem(getCatItems(e,cat), id); saveEntry({ ...e, expenses: { ...e.expenses, [cat]: its } }); render(); },
        ()      => { const e = getEntry(); const its = getCatItems(e,cat).concat([ni()]); saveEntry({ ...e, expenses: { ...e.expenses, [cat]: its } }); render(); },
        "Add item", rc
      ));
    }
  });
  const footer = el("div", { className: "section-footer" });
  footer.appendChild(el("span", { style: "flex:1;" }, "Total"));
  footer.appendChild(el("span", {}, fmt(totalExp)));
  expSection.appendChild(footer);
  wrap.appendChild(expSection);

  // Investing section
  const invItems = getInvItems(entry);
  const invRC = invItems.filter(i => i.recurring).length;
  const totalInv = listTotal(entry.investing);
  const t12Inv = trail12(state.data, state.year, state.month, INVEST_CAT);
  const invDelta = t12Inv != null && totalInv > 0 ? pct(totalInv, t12Inv) : null;
  wrap.appendChild(renderSection("Investing", "green",
    renderCatRow("__invest__", "Total invested", totalInv, t12Inv, invRC, state.investOpen, false,
      () => { state.investOpen = !state.investOpen; render(); }, null, invDelta, true),
    state.investOpen ? renderExpand(invItems,
      (id, v) => { const e = getEntry(); saveEntry({ ...e, investing: updateListItem(getInvItems(e), id, "label", v) }); rerenderExpand(); },
      (id, v) => { const e = getEntry(); saveEntry({ ...e, investing: updateListItem(getInvItems(e), id, "amount", v) }); rerenderExpand(); },
      (id)    => { const e = getEntry(); saveEntry({ ...e, investing: toggleListItem(getInvItems(e), id) }); render(); },
      (id)    => { const e = getEntry(); saveEntry({ ...e, investing: removeListItem(getInvItems(e), id) }); render(); },
      ()      => { const e = getEntry(); saveEntry({ ...e, investing: getInvItems(e).concat([ni()]) }); render(); },
      "Add investment", invRC
    ) : null
  ));

  // Add category
  const addRow = el("div", { className: "add-row" });
  const addInp = el("input", { className: "add-input", type: "text", placeholder: "Add expense category…", value: state.newCat });
  addInp.addEventListener("input", e => { state.newCat = e.target.value; });
  addInp.addEventListener("keydown", e => { if (e.key === "Enter") addCat(); });
  const addBtn = el("button", { className: "add-btn" }, "Add");
  addBtn.addEventListener("click", addCat);
  addRow.appendChild(addInp); addRow.appendChild(addBtn);
  wrap.appendChild(addRow);

  const changeBtn = el("button", { className: "change-url-btn" }, "⚙ Change Google Sheets URL");
  changeBtn.addEventListener("click", () => { localStorage.removeItem("budget-url"); state.scriptUrl = ""; state.loaded = false; render(); });
  wrap.appendChild(changeBtn);

  return wrap;
}

function addCat() {
  const t = state.newCat.trim();
  if (!t || state.cats.includes(t)) return;
  state.cats = [...state.cats, t];
  state.newCat = "";
  persist();
  render();
}

function renderSection(title, color, ...children) {
  const sec = el("div", { className: "section" });
  sec.appendChild(el("div", { className: "section-head " + color }, title));
  children.forEach(c => { if (c) sec.appendChild(c); });
  return sec;
}

function renderCatRow(key, name, total, avg, rc, isOpen, showRemove, onToggle, onRemove, delta, isInvesting) {
  const row = el("div", { className: "cat-row" });
  row.addEventListener("click", onToggle);

  row.appendChild(el("span", { className: "arrow" + (isOpen ? " open" : "") }, "▶"));
  row.appendChild(el("span", { className: "cat-name" }, name));

  if (rc > 0) row.appendChild(el("span", { className: "badge" }, "🔁 " + rc));

  if (delta != null) {
    const up = Number(delta) > 0;
    const color = isInvesting ? (up ? "green" : "red") : (up ? "red" : "green");
    row.appendChild(el("span", { className: color, style: "font-size:11px;font-weight:600;" }, (up ? "+" : "") + delta + "%"));
  }

  if (avg != null) row.appendChild(el("span", { className: "cat-avg" }, fmt(avg)));

  const tv = el("span", { className: "cat-total" + (total > 0 ? "" : " empty") }, total > 0 ? fmt(total) : "€0");
  row.appendChild(tv);

  if (showRemove && onRemove) {
    const rb = el("button", { className: "remove-btn" }, "✕");
    rb.addEventListener("click", e => { e.stopPropagation(); onRemove(); });
    row.appendChild(rb);
  }
  return row;
}

function renderExpand(items, onLabel, onAmount, onToggleRec, onRemove, onAdd, addLabel, rc) {
  const area = el("div", { className: "expand-area" });

  items.forEach(item => {
    const row = el("div", { className: "item-row" });

    const recBtn = el("button", { className: "recur-btn" + (item.recurring ? " on" : ""), title: item.recurring ? "Recurring — click to disable" : "Repeat every month" }, "🔁");
    recBtn.addEventListener("click", () => onToggleRec(item.id));

    const labelInp = el("input", { className: "item-label", type: "text", value: item.label, placeholder: "Description" });
    labelInp.addEventListener("change", e => onLabel(item.id, e.target.value));

    const eurSpan = el("span", { className: "eur" }, "€");

    const amtInp = el("input", { className: "item-amount", type: "number", min: "0", value: item.amount, placeholder: "0" });
    amtInp.addEventListener("change", e => onAmount(item.id, e.target.value));

    const rmBtn = el("button", { className: "remove-btn", style: "font-size:15px;" }, "✕");
    rmBtn.addEventListener("click", () => onRemove(item.id));

    row.appendChild(recBtn); row.appendChild(labelInp); row.appendChild(eurSpan); row.appendChild(amtInp); row.appendChild(rmBtn);
    area.appendChild(row);
  });

  const addBtn = el("button", { className: "add-item-btn" }, "＋ " + addLabel);
  addBtn.addEventListener("click", onAdd);
  area.appendChild(addBtn);

  const filled = items.filter(i => Number(i.amount) > 0).length;
  if (filled > 1) {
    const tot = items.reduce((s, x) => s + (Number(x.amount) || 0), 0);
    area.appendChild(el("div", { className: "expand-total" }, "Total: " + fmt(tot)));
  }
  if (rc > 0) area.appendChild(el("div", { className: "recur-note" }, "🔁 " + rc + " item" + (rc > 1 ? "s" : "") + " will auto-repeat next month."));

  return area;
}

// Lightweight re-render that only updates totals/badges without losing focus
function rerenderExpand() {
  // Just persist — no full re-render, inputs keep focus
  const entry = getEntry();
  // Update summary cards
  const totalInc = entryIncome(entry);
  const totalExp = state.cats.reduce((s, c) => s + listTotal(entry.expenses && entry.expenses[c]), 0);
  const totalInv = listTotal(entry.investing);
  const netCash  = totalInc - totalExp - totalInv;
  document.querySelectorAll(".card").forEach((card, i) => {
    const vals = [totalInc, totalExp, totalInv, netCash];
    const vEl = card.querySelector(".card-val");
    if (vEl) vEl.textContent = fmt(vals[i] || null);
  });
}

// ── Chart tab ─────────────────────────────────────────────────────────────────
function renderChart(entry) {
  const wrap = el("div", { className: "chart-wrap" });
  wrap.appendChild(el("div", { className: "chart-title" }, "Spending vs. 12-month average"));
  wrap.appendChild(el("div", { className: "chart-sub" }, MONTHS[state.month] + " " + state.year));

  const pairs = state.cats.map(cat => ({
    cat, cur: listTotal(entry.expenses && entry.expenses[cat]),
    avg: trail12(state.data, state.year, state.month, cat)
  })).filter(d => d.cur > 0 || d.avg != null);

  if (pairs.length === 0) {
    wrap.appendChild(el("div", { style: "text-align:center;color:#9ca3af;padding:40px 0;font-size:13px;" }, "Enter expenses in the Entry tab to see the chart."));
    return wrap;
  }

  const leg = el("div", { className: "legend" });
  [["#6366f1","This month"],["#c7d2fe","12m avg"]].forEach(([color, label]) => {
    const item = el("span");
    item.appendChild(el("span", { className: "legend-dot", style: "background:" + color + ";" }));
    item.appendChild(document.createTextNode(label));
    leg.appendChild(item);
  });
  wrap.appendChild(leg);

  const maxVal = Math.max(...pairs.map(p => Math.max(p.cur, p.avg || 0)), 1);
  pairs.forEach(({ cat, cur, avg }) => {
    const row = el("div", { className: "bar-row" });
    row.appendChild(el("span", { className: "bar-label", title: cat }, cat));
    const track = el("div", { className: "bar-track", style: "position:relative;height:32px;" });

    if (avg != null) {
      const avgBar = el("div", { className: "bar-fill", style: `background:#c7d2fe;width:${(avg/maxVal*100).toFixed(1)}%;height:32px;` });
      track.appendChild(avgBar);
    }
    if (cur > 0) {
      const curBar = el("div", { className: "bar-fill", style: `background:#6366f1;width:${(cur/maxVal*100).toFixed(1)}%;height:18px;top:7px;` });
      track.appendChild(curBar);
    }
    row.appendChild(track);
    row.appendChild(el("span", { className: "bar-val" }, fmt(cur)));
    wrap.appendChild(row);
  });

  return wrap;
}

// ── Trends tab ────────────────────────────────────────────────────────────────
function renderTrends() {
  const wrap = el("div");

  // Category selector
  const topWrap = el("div", { className: "chart-wrap" });
  const titleRow = el("div", { style: "display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;" });
  titleRow.appendChild(el("span", { className: "chart-title" }, "Monthly trend (13 months)"));
  const sel = el("select", { style: "font-size:12px;border:1px solid #e5e7eb;border-radius:6px;padding:4px 8px;outline:none;" });
  [...state.cats, INVEST_CAT, "Income", "Net Cash"].forEach(c => {
    const o = el("option", { value: c }, c);
    if (c === state.trendCat) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener("change", e => { state.trendCat = e.target.value; render(); });
  titleRow.appendChild(sel);
  topWrap.appendChild(titleRow);

  // Build trend data
  const pts = [];
  for (let i = 12; i >= 0; i--) {
    let pm = state.month - i, py = state.year;
    if (pm < 0) { pm += 12; py--; }
    const e = state.data[mk(py, pm)];
    let val = 0;
    if (e) {
      if (state.trendCat === "Income") val = entryIncome(e);
      else if (state.trendCat === "Net Cash") val = entryIncome(e) - state.cats.reduce((s,c) => s + listTotal(e.expenses && e.expenses[c]), 0) - listTotal(e.investing);
      else if (state.trendCat === INVEST_CAT) val = listTotal(e.investing);
      else val = listTotal(e.expenses && e.expenses[state.trendCat]);
    }
    pts.push({ label: MONTHS[pm], val });
  }

  // Simple SVG sparkline
  const maxV = Math.max(...pts.map(p => p.val), 1);
  const W = 600, H = 140, PAD = 30;
  const xs = pts.map((_, i) => PAD + i * (W - PAD * 2) / (pts.length - 1));
  const ys = pts.map(p => H - PAD - (p.val / maxV) * (H - PAD * 2));
  const pathD = xs.map((x, i) => (i === 0 ? "M" : "L") + x.toFixed(1) + "," + ys[i].toFixed(1)).join(" ");
  const fillD = `M${xs[0].toFixed(1)},${H-PAD} ` + xs.map((x,i) => `L${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ") + ` L${xs[xs.length-1].toFixed(1)},${H-PAD} Z`;

  const color = state.trendCat === INVEST_CAT ? "#10b981" : "#6366f1";
  const fillColor = state.trendCat === INVEST_CAT ? "#d1fae5" : "#e0e7ff";

  let svgHtml = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:150px;">`;
  // Grid lines
  for (let i = 0; i <= 4; i++) {
    const y = PAD + (H - PAD*2) * i / 4;
    const val = maxV * (1 - i/4);
    svgHtml += `<line x1="${PAD}" y1="${y.toFixed(1)}" x2="${W-PAD}" y2="${y.toFixed(1)}" stroke="#f3f4f6" stroke-width="1"/>`;
    svgHtml += `<text x="${PAD-4}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="9" fill="#9ca3af">${val>=1000?(val/1000).toFixed(0)+"k":Math.round(val)}</text>`;
  }
  // Area fill
  svgHtml += `<path d="${fillD}" fill="${fillColor}" opacity="0.6"/>`;
  // Line
  svgHtml += `<path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>`;
  // Dots + labels
  xs.forEach((x, i) => {
    svgHtml += `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3" fill="${color}"/>`;
    svgHtml += `<text x="${x.toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#9ca3af">${pts[i].label}</text>`;
  });
  svgHtml += `</svg>`;

  const svgWrap = el("div");
  svgWrap.innerHTML = svgHtml;
  topWrap.appendChild(svgWrap);
  wrap.appendChild(topWrap);

  // Overview stacked bar chart (SVG)
  const ovWrap = el("div", { className: "chart-wrap" });
  ovWrap.appendChild(el("div", { className: "chart-title", style: "margin-bottom:12px;" }, "Overview (13 months)"));

  const ovPts = [];
  for (let i = 12; i >= 0; i--) {
    let pm = state.month - i, py = state.year;
    if (pm < 0) { pm += 12; py--; }
    const e = state.data[mk(py, pm)];
    const inc = e ? entryIncome(e) : 0;
    const exp = e ? state.cats.reduce((s,c) => s + listTotal(e.expenses && e.expenses[c]), 0) : 0;
    const inv = e ? listTotal(e.investing) : 0;
    ovPts.push({ label: MONTHS[pm], inc, exp, inv, sav: inc - exp - inv });
  }

  const ovMax = Math.max(...ovPts.map(p => Math.max(p.inc, p.exp, p.inv, Math.max(0, p.sav))), 1);
  const bW = 600, bH = 160, bPadL = 36, bPadR = 10, bPadT = 10, bPadB = 20;
  const chartW = bW - bPadL - bPadR;
  const chartH = bH - bPadT - bPadB;
  const groupW = chartW / ovPts.length;
  const barGap = 1;
  const groupPad = groupW * 0.15;
  const barW = Math.max(1, (groupW - groupPad * 2 - barGap * 3) / 4);

  let ovSvg = `<svg viewBox="0 0 ${bW} ${bH}" style="width:100%;height:200px;">`;
  for (let g = 0; g <= 4; g++) {
    const y = bPadT + chartH * g / 4;
    const val = ovMax * (1 - g/4);
    ovSvg += `<line x1="${bPadL}" y1="${y.toFixed(1)}" x2="${bW-bPadR}" y2="${y.toFixed(1)}" stroke="#f3f4f6" stroke-width="1"/>`;
    ovSvg += `<text x="${bPadL-4}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#9ca3af">${val>=1000?(val/1000).toFixed(0)+"k":Math.round(val)}</text>`;
  }
  ovPts.forEach((p, i) => {
    const gx = bPadL + i * groupW + groupPad;
    const bars = [
      { val: p.inc, color: "#6366f1" },
      { val: p.exp, color: "#f87171" },
      { val: p.inv, color: "#10b981" },
      { val: Math.max(0, p.sav), color: "#f97316" },
    ];
    bars.forEach((bar, bi) => {
      const bx = gx + bi * (barW + barGap);
      const bh = Math.max(0, (bar.val / ovMax) * chartH);
      const by = bPadT + chartH - bh;
      ovSvg += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${bar.color}" rx="1"/>`;
    });
    const cx = gx + (barW * 4 + barGap * 3) / 2;
    ovSvg += `<text x="${cx.toFixed(1)}" y="${bH-4}" text-anchor="middle" font-size="8" fill="#9ca3af">${p.label}</text>`;
  });
  ovSvg += `</svg>`;

  const ovLeg = el("div", { className: "legend" });
  [["#6366f1","Income"],["#f87171","Expenses"],["#10b981","Investing"],["#f97316","Net Cash"]].forEach(([color, label]) => {
    const item = el("span");
    item.appendChild(el("span", { className: "legend-dot", style: "background:" + color + ";" }));
    item.appendChild(document.createTextNode(label));
    ovLeg.appendChild(item);
  });
  ovWrap.appendChild(ovLeg);
  const ovWrapInner = el("div");
  ovWrapInner.innerHTML = ovSvg;
  ovWrap.appendChild(ovWrapInner);
  wrap.appendChild(ovWrap);

  return wrap;
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === "className") node.className = v;
    else if (k === "style" && typeof v === "string") node.style.cssText = v;
    else node[k] = v;
  });
  children.forEach(c => {
    if (c == null) return;
    if (typeof c === "string") node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}
function a(href, text) { return el("a", { href, target: "_blank" }, text); }
function b(text) { return el("strong", {}, text); }

// ── Boot ──────────────────────────────────────────────────────────────────────
if (state.scriptUrl) {
  loadData();
} else {
  render();
}
</script>
